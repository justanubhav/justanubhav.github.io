---
layout: default
---

<section class="post-shell">
  <div class="post-card">
    <h1>{{ page.title }}</h1>
    <p class="post-date">
      {{ page.date | date: "%B %-d, %Y" }}
      {% if page.pinned %}
        <span class="pinned-badge" title="Pinned">Pinned</span>
      {% endif %}
    </p>
    <div class="post-content">
      {{ content }}
    </div>
  </div>
</section>

<script src="https://utteranc.es/client.js"
        repo="justanubhav/justanubhav.github.io"
        issue-term="pathname"
        label="comments"
        theme="preferred-color-scheme"
        crossorigin="anonymous"
        async>
</script>
