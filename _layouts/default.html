<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - {{ site.title }}</title>

  <link rel="icon" href="{{ '/assets/images/favicon.png' | relative_url }}" type="image/png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>

<body id="top">
  <div id="scroll-progress"></div>

  <div class="site-nav-shell">
    <button
      class="nav-toggle"
      type="button"
      aria-label="Open navigation menu"
      aria-expanded="false"
      aria-controls="site-nav"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav id="site-nav">
      <a href="{{ '/#top' | relative_url }}">Home</a>
      <a href="{{ '/#profile' | relative_url }}">Profile</a>
      <a href="{{ '/#resume' | relative_url }}">Resume</a>
      <a href="{{ '/#contact' | relative_url }}">Contact</a>
      <a href="{{ '/blurbs/' | relative_url }}">Blurbs</a>
    </nav>
  </div>

  <main>
    {{ content }}
  </main>

  <script src="{{ '/assets/js/scripts.js' | relative_url }}"></script>
</body>
</html>
